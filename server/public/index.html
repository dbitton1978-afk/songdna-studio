<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SongDNA Studio</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h1>SongDNA Studio 🎧</h1>

<input type="file" id="fileInput"><br><br>

<!-- 🔥 Boost -->
<div>
  <button onclick="setMode('club')">Club 🔥</button>
  <button onclick="setMode('viral')">Viral 🚀</button>
  <button onclick="setMode('emotional')">Emotional ❤️</button>
  <button onclick="setMode('aggressive')">Aggressive ⚡</button>
</div>

<br>

<label>Similarity: <span id="simValue">60</span>%</label><br>
<input type="range" min="20" max="90" value="60" id="similarity" oninput="updateSim()" style="width: 300px;">

<br><br>

<button onclick="upload()">Upload</button>
<button onclick="extract()">Extract DNA</button>
<button onclick="generate()">Generate Variation</button>
<button onclick="autoRemix()">🔥 Auto Remix</button>

<br><br>

<!-- 🎯 בחירה -->
<div>
  <label>בחר וריאציה:</label>
  <select id="variationSelect"></select>
</div>

<br>

<!-- 🚀 Actions -->
<div>
  <button onclick="copyPrompt()">📋 Copy Prompt</button>
  <button onclick="openSuno()">🎵 Open in Suno</button>
</div>

<br>

<pre id="result"></pre>

<script>
let lastFileUrl = "";
let currentDNA = null;
let currentMode = "club";
let variations = [];
let selectedIndex = 0;

// --------------------
function setMode(mode) {
  currentMode = mode;
}

function updateSim() {
  const val = document.getElementById("similarity").value;
  document.getElementById("simValue").innerText = val;
}

// --------------------
// Upload
async function upload() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("בחר קובץ");

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("/api/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  lastFileUrl = data.fileUrl;

  document.getElementById("result").innerText =
    JSON.stringify(data, null, 2);
}

// --------------------
// Extract
async function extract() {
  if (!lastFileUrl) return alert("תעלה קובץ קודם");

  const res = await fetch("/api/dna/extract", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ fileUrl: lastFileUrl })
  });

  const data = await res.json();
  currentDNA = data.dna;

  document.getElementById("result").innerText =
    JSON.stringify(data, null, 2);
}

// --------------------
// Generate single
async function generate() {
  const similarity = document.getElementById("similarity").value;

  const res = await fetch("/api/variation/generate", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      dna: currentDNA,
      similarity: Number(similarity),
      type: currentMode
    })
  });

  const data = await res.json();

  variations = [data]; // רק אחת
  selectedIndex = 0;
  updateDropdown();

  document.getElementById("result").innerText =
    JSON.stringify(data, null, 2);
}

// --------------------
// 🔥 AUTO REMIX
async function autoRemix() {
  const similarity = document.getElementById("similarity").value;

  document.getElementById("result").innerText = "Generating...";

  const res = await fetch("/api/variation/auto-remix", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      dna: currentDNA,
      similarity: Number(similarity),
      type: currentMode
    })
  });

  const data = await res.json();

  variations = data.all;
  selectedIndex = 0;

  updateDropdown();

  document.getElementById("result").innerText =
    JSON.stringify(data.best, null, 2);
}

// --------------------
// 🎯 Dropdown
function updateDropdown() {
  const select = document.getElementById("variationSelect");
  select.innerHTML = "";

  variations.forEach((v, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.text = "Variation " + (i + 1) + " (score: " + (v.score || "-") + ")";
    select.appendChild(option);
  });

  select.onchange = () => {
    selectedIndex = select.value;
  };
}

// --------------------
// 📋 Copy
function copyPrompt() {
  if (!variations.length) return alert("אין וריאציות");

  const prompt = variations[selectedIndex].production_prompt;

  navigator.clipboard.writeText(prompt);
  alert("הועתק!");
}

// --------------------
// 🎵 Suno
function openSuno() {
  if (!variations.length) return alert("אין וריאציות");

  const prompt = variations[selectedIndex].production_prompt;

  window.open("https://app.suno.ai/", "_blank");

  // המשתמש מדביק שם
}
</script>

</body>
</html>
