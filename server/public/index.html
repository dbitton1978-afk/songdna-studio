<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SongDNA Studio</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

  <h1>SongDNA Studio 🎧</h1>

  <!-- Upload -->
  <input type="file" id="fileInput" />
  <br><br>

  <!-- Buttons -->
  <button onclick="upload()">Upload</button>
  <button onclick="extract()">Extract DNA</button>
  <button onclick="generate()">Generate Variation</button>

  <br><br>

  <!-- Result -->
  <pre id="result"></pre>

  <script>
    let currentDNA = null;

    // 🔼 Upload
    async function upload() {
      const fileInput = document.getElementById("fileInput");

      if (!fileInput.files.length) {
        alert("בחר קובץ קודם");
        return;
      }

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);

      const res = await fetch("/api/upload", {
        method: "POST",
        body: formData,
      });

      const data = await res.json();
      document.getElementById("result").textContent =
        JSON.stringify(data, null, 2);
    }

    // 🧬 Extract DNA
    async function extract() {
      document.getElementById("result").textContent = "Loading DNA...";

      const res = await fetch("/api/dna");
      const data = await res.json();

      if (!data.success) {
        document.getElementById("result").textContent = "DNA Error ❌";
        return;
      }

      currentDNA = data.dna;

      document.getElementById("result").textContent =
        JSON.stringify(data, null, 2);
    }

    // 🔥 Generate Variation (AI)
    async function generate() {
      if (!currentDNA) {
        alert("תעשה קודם Extract DNA");
        return;
      }

      document.getElementById("result").textContent = "Generating... ⏳";

      const res = await fetch("/api/variation", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          dna: currentDNA,
          mode: "club"
        }),
      });

      const data = await res.json();

      if (!data.success) {
        document.getElementById("result").textContent =
          "AI Error ❌\n\n" + JSON.stringify(data, null, 2);
        return;
      }

      document.getElementById("result").textContent =
        JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
