<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SongDNA Studio</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

.card-container {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  width:260px;
}
</style>
</head>

<body>

<h1>SongDNA Studio 🎧</h1>

<input type="file" id="fileInput"><br><br>

<button onclick="upload()">Upload</button>
<button onclick="extract()">Extract DNA</button>
<button onclick="autoRemix()">🔥 Auto Remix</button>

<br><br>

<label>Similarity: <span id="simValue">60</span>%</label><br>
<input type="range" id="similarity" min="20" max="90" value="60" oninput="updateSim()">

<br><br>

<div id="cards" class="card-container"></div>

<script>
let lastFileUrl = "";
let currentDNA = null;
let variations = [];

// ----------------
function updateSim() {
  document.getElementById("simValue").innerText =
    document.getElementById("similarity").value;
}

// ----------------
// Upload
async function upload() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("בחר קובץ");

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("/api/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  lastFileUrl = data.fileUrl;

  alert("Upload OK ✔");
}

// ----------------
// Extract DNA
async function extract() {
  if (!lastFileUrl) return alert("תעלה קובץ קודם");

  const res = await fetch("/api/dna/extract", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ fileUrl: lastFileUrl })
  });

  const data = await res.json();

  if (!data.success) {
    alert("DNA Error ❌");
    return;
  }

  currentDNA = data.dna;

  alert("DNA Ready ✔");
}

// ----------------
// AUTO REMIX
async function autoRemix() {
  if (!currentDNA) return alert("תעשה Extract קודם");

  const similarity = document.getElementById("similarity").value;

  const res = await fetch("/api/variation/auto-remix", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      dna: currentDNA,
      similarity: Number(similarity),
      type: "club"
    })
  });

  const data = await res.json();

  if (!data.success) {
    alert("Auto Remix Error ❌");
    return;
  }

  variations = data.all;

  renderCards();
}

// ----------------
// Render Cards
function renderCards() {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  variations.forEach((v, i) => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>Variation ${i+1}</h3>
      <p><b>Score:</b> ${v.score || "-"}</p>
      <p><b>BPM:</b> ${v.newDNA?.bpm || "-"}</p>

      <button onclick="copyPrompt(${i})">📋 Copy Prompt</button>
      <button onclick="openSuno(${i})">🎵 Open Suno</button>
    `;

    container.appendChild(card);
  });
}

// ----------------
// Copy Prompt
function copyPrompt(i) {
  const prompt = variations[i].production_prompt;

  if (!prompt) {
    alert("אין פרומפט");
    return;
  }

  navigator.clipboard.writeText(prompt);
  alert("Copied ✔");
}

// ----------------
// Open Suno
function openSuno(i) {
  const prompt = variations[i].production_prompt;

  if (!prompt) {
    alert("אין פרומפט");
    return;
  }

  window.open("https://app.suno.ai/", "_blank");

  setTimeout(() => {
    alert("הדבק את הפרומפט ב-Suno 🎧");
  }, 500);
}
</script>

</body>
</html>
