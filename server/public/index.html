<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SongDNA Studio</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h1>SongDNA Studio 🎧</h1>

<input type="file" id="fileInput"><br><br>

<!-- 🔥 Boost Buttons -->
<div>
  <button onclick="setMode('club')">Club 🔥</button>
  <button onclick="setMode('viral')">Viral 🚀</button>
  <button onclick="setMode('emotional')">Emotional ❤️</button>
  <button onclick="setMode('aggressive')">Aggressive ⚡</button>
</div>

<br>

<!-- 🔧 Similarity -->
<label>Similarity: <span id="simValue">60</span>%</label><br>
<input type="range" min="20" max="90" value="60" id="similarity" oninput="updateSim()" style="width: 300px;">

<br><br>

<button onclick="upload()">Upload</button>
<button onclick="extract()">Extract DNA</button>
<button onclick="generate()">Generate Variation</button>

<pre id="result"></pre>

<script>
let lastFileUrl = "";
let currentDNA = null;
let currentMode = "club";

function setMode(mode) {
  currentMode = mode;
  document.getElementById("result").innerText = "Mode: " + mode;
}

function updateSim() {
  const val = document.getElementById("similarity").value;
  document.getElementById("simValue").innerText = val;
}

// 🔼 Upload
async function upload() {
  try {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
      alert("בחר קובץ קודם");
      return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("/api/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    lastFileUrl = data.fileUrl;

    document.getElementById("result").innerText =
      "UPLOAD:\n" + JSON.stringify(data, null, 2);

  } catch {
    document.getElementById("result").innerText = "Upload Error ❌";
  }
}

// 🧬 Extract
async function extract() {
  try {
    if (!lastFileUrl) {
      alert("תעלה קובץ קודם");
      return;
    }

    document.getElementById("result").innerText = "Extracting...";

    const res = await fetch("/api/dna/extract", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ fileUrl: lastFileUrl })
    });

    const data = await res.json();

    if (!data.success) {
      document.getElementById("result").innerText = "DNA Error ❌";
      return;
    }

    currentDNA = data.dna;

    document.getElementById("result").innerText =
      "DNA:\n" + JSON.stringify(data, null, 2);

  } catch {
    document.getElementById("result").innerText = "DNA Error ❌";
  }
}

// 🔥 Generate
async function generate() {
  try {
    if (!currentDNA) {
      alert("תעשה Extract DNA קודם");
      return;
    }

    const similarity = document.getElementById("similarity").value;

    document.getElementById("result").innerText = "Generating...";

    const res = await fetch("/api/variation/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        dna: currentDNA,
        similarity: Number(similarity),
        type: currentMode
      })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
      "VARIATION:\n" + JSON.stringify(data, null, 2);

  } catch {
    document.getElementById("result").innerText = "Variation Error ❌";
  }
}
</script>

</body>
</html>
