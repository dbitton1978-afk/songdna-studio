<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SongDNA Studio</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h1>SongDNA Studio 🎧</h1>

<input type="file" id="fileInput"><br><br>

<select id="mode">
  <option value="club">Club 🔥</option>
  <option value="viral">Viral 🚀</option>
  <option value="emotional">Emotional ❤️</option>
  <option value="aggressive">Aggressive ⚡</option>
</select>

<br><br>

<label>Similarity:</label>
<input type="range" id="similarity" min="20" max="90" value="60">
<span id="simValue">60</span>

<br><br>

<button onclick="upload()">Upload</button>
<button onclick="extract()">Extract DNA</button>
<button onclick="blueprint()">🧠 DNA → Blueprint</button>

<br><br>

<button onclick="copyPrompt()">📋 Copy Prompt</button>
<button onclick="openSuno()">🎵 Open Suno</button>

<pre id="result"></pre>

<script>
let lastFileUrl = "";
let currentDNA = null;
let sunoPrompt = "";

/* =========================================
   🎚️ Slider
========================================= */
document.getElementById("similarity").oninput = function() {
  document.getElementById("simValue").innerText = this.value;
};

/* =========================================
   📤 Upload
========================================= */
async function upload() {
  try {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
      alert("בחר קובץ קודם");
      return;
    }

    const formData = new FormData();
    formData.append("file", file);

    document.getElementById("result").innerText = "Uploading...";

    const res = await fetch("/api/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    lastFileUrl = data.fileUrl || "";

    document.getElementById("result").innerText =
      "UPLOAD:\n" + JSON.stringify(data, null, 2);

  } catch (err) {
    console.error(err);
    document.getElementById("result").innerText = "Upload Error ❌";
  }
}

/* =========================================
   🧬 Extract DNA
========================================= */
async function extract() {
  try {
    if (!lastFileUrl) {
      alert("תעלה קובץ קודם");
      return;
    }

    document.getElementById("result").innerText = "Extracting DNA...";

    const res = await fetch("/api/dna/extract", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ fileUrl: lastFileUrl })
    });

    const data = await res.json();

    if (!data.success) {
      document.getElementById("result").innerText = "DNA Error ❌";
      return;
    }

    currentDNA = data.dna;
    sunoPrompt = "";

    document.getElementById("result").innerText =
      "DNA:\n" + JSON.stringify(data, null, 2);

  } catch (err) {
    console.error(err);
    document.getElementById("result").innerText = "DNA Error ❌";
  }
}

/* =========================================
   🧠 DNA → Blueprint
========================================= */
async function blueprint() {
  try {
    if (!currentDNA) {
      alert("תעשה Extract קודם");
      return;
    }

    document.getElementById("result").innerText = "Building Blueprint...";

    const res = await fetch("/api/dna/blueprint", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ dna: currentDNA })
    });

    const data = await res.json();

    if (!data.success) {
      document.getElementById("result").innerText = "Blueprint Error ❌";
      return;
    }

    sunoPrompt = data.sunoPrompt || "";

    document.getElementById("result").innerText =
      "BLUEPRINT:\n" +
      JSON.stringify(data.blueprint, null, 2) +
      "\n\n🎧 SUNO PROMPT:\n" +
      sunoPrompt;

  } catch (err) {
    console.error(err);
    document.getElementById("result").innerText = "Blueprint Error ❌";
  }
}

/* =========================================
   📋 Copy
========================================= */
function copyPrompt() {
  if (!sunoPrompt) {
    alert("אין prompt עדיין");
    return;
  }

  navigator.clipboard.writeText(sunoPrompt);
  alert("Copied ✔");
}

/* =========================================
   🎵 Suno
========================================= */
function openSuno() {
  if (!sunoPrompt) {
    alert("אין prompt עדיין");
    return;
  }

  window.open("https://suno.com/create", "_blank");
}
</script>

</body>
</html>
