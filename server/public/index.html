<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SongDNA Studio</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h1>SongDNA Studio 🎧</h1>

<input type="file" id="fileInput"><br><br>

<button onclick="upload()">Upload</button>
<button onclick="extract()">Extract DNA</button>
<button onclick="generate()">Generate Variation</button>

<pre id="result"></pre>

<script>
let lastFileUrl = "";
let currentDNA = null;

async function upload() {
  try {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
      alert("בחר קובץ קודם");
      return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("/api/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    lastFileUrl = data.fileUrl;

    document.getElementById("result").innerText =
      "UPLOAD:\n" + JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("result").innerText = "Upload Error ❌";
  }
}

async function extract() {
  try {
    if (!lastFileUrl) {
      alert("תעלה קובץ קודם");
      return;
    }

    document.getElementById("result").innerText = "Extracting...";

    const res = await fetch("/api/dna/extract", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ fileUrl: lastFileUrl })
    });

    const data = await res.json();

    if (!data.success) {
      document.getElementById("result").innerText = "DNA Error ❌";
      return;
    }

    currentDNA = data.dna;

    document.getElementById("result").innerText =
      "DNA:\n" + JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("result").innerText = "DNA Error ❌";
  }
}

async function generate() {
  try {
    if (!currentDNA) {
      alert("תעשה Extract DNA קודם");
      return;
    }

    document.getElementById("result").innerText = "Generating...";

    const res = await fetch("/api/variation/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        dna: currentDNA,
        similarity: 60,
        type: "club"
      })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
      "VARIATION:\n" + JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("result").innerText = "Variation Error ❌";
  }
}
</script>

</body>
</html>
