<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SongDNA Studio</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h1>SongDNA Studio 🎧</h1>

<input type="file" id="fileInput"><br><br>

<!-- 🎯 בחירת מצב -->
<select id="mode">
  <option value="club">Club 🔥</option>
  <option value="viral">Viral 🚀</option>
  <option value="emotional">Emotional ❤️</option>
  <option value="aggressive">Aggressive ⚡</option>
</select>

<br><br>

<!-- 🎚️ שליטת דמיון -->
<label>Similarity:</label>
<input type="range" id="similarity" min="20" max="90" value="60">
<span id="simValue">60</span>

<br><br>

<button onclick="upload()">Upload</button>
<button onclick="extract()">Extract DNA</button>
<button onclick="generate()">Generate Variation</button>
<button onclick="autoRemix()">🔥 Auto Remix</button>

<br><br>

<!-- 🎯 פעולות -->
<button onclick="copyPrompt()">📋 Copy Prompt</button>
<button onclick="openSuno()">🎵 Open Suno</button>

<pre id="result"></pre>

<script>
let lastFileUrl = "";
let currentDNA = null;
let bestPrompt = "";
let currentMode = "club";

/* 🎚️ עדכון מספר */
document.getElementById("similarity").oninput = function() {
  document.getElementById("simValue").innerText = this.value;
};

/* 🎯 שינוי מצב */
document.getElementById("mode").onchange = function() {
  currentMode = this.value;
};

/* 📤 Upload */
async function upload() {
  try {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("בחר קובץ קודם");

    const formData = new FormData();
    formData.append("file", file);

    document.getElementById("result").innerText = "Uploading...";

    const res = await fetch("/api/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    lastFileUrl = data.fileUrl;

    document.getElementById("result").innerText =
      "UPLOAD:\n" + JSON.stringify(data, null, 2);

  } catch {
    document.getElementById("result").innerText = "Upload Error ❌";
  }
}

/* 🧬 Extract */
async function extract() {
  try {
    document.getElementById("result").innerText = "Extracting DNA...";

    const res = await fetch("/api/dna/extract", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ fileUrl: lastFileUrl })
    });

    const data = await res.json();
    currentDNA = data.dna;

    document.getElementById("result").innerText =
      "DNA:\n" + JSON.stringify(data, null, 2);

  } catch {
    document.getElementById("result").innerText = "DNA Error ❌";
  }
}

/* ⚡ Generate רגיל */
async function generate() {
  try {
    document.getElementById("result").innerText = "Generating...";

    const similarity = document.getElementById("similarity").value;

    const res = await fetch("/api/variation/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        dna: currentDNA,
        similarity: Number(similarity),
        type: currentMode
      })
    });

    const data = await res.json();

    bestPrompt = data.production_prompt || "";

    document.getElementById("result").innerText =
      "VARIATION:\n" + JSON.stringify(data, null, 2);

  } catch {
    document.getElementById("result").innerText = "Generate Error ❌";
  }
}

/* 🔥 Auto Remix */
async function autoRemix() {
  try {
    if (!currentDNA) {
      alert("תעשה Extract קודם");
      return;
    }

    const similarity = document.getElementById("similarity").value;

    document.getElementById("result").innerText = "Generating Auto Remix...";

    const res = await fetch("/api/variation/auto-remix", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        dna: currentDNA,
        similarity: Number(similarity),
        type: currentMode
      })
    });

    const data = await res.json();

    /* 🔥 שומר BEST */
    bestPrompt = data.best?.production_prompt || "";

    document.getElementById("result").innerText =
      "🏆 BEST VERSION:\n" +
      JSON.stringify(data.best, null, 2) +
      "\n\n🔥 ALL VARIATIONS:\n" +
      JSON.stringify(data.all, null, 2);

  } catch {
    document.getElementById("result").innerText = "Auto Remix Error ❌";
  }
}

/* 📋 COPY */
function copyPrompt() {
  if (!bestPrompt) {
    alert("אין Prompt עדיין");
    return;
  }

  navigator.clipboard.writeText(bestPrompt);
  alert("Copied!");
}

/* 🎵 SUNO */
function openSuno() {
  if (!bestPrompt) {
    alert("אין Prompt עדיין");
    return;
  }

  const url = "https://suno.com/create";
  window.open(url, "_blank");
}
</script>

</body>
</html>
