<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SongDNA Studio</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h1>SongDNA Studio 🎧</h1>

<input type="file" id="fileInput"><br><br>

<button onclick="upload()">Upload</button>
<button onclick="extract()">Extract DNA</button>
<button onclick="generate()">Generate Variation</button>

<pre id="result"></pre>

<script>
let lastFileUrl = "";
let currentDNA = null;

async function upload() {
  const file = document.getElementById("fileInput").files[0];
  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("/api/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  lastFileUrl = data.fileUrl;

  document.getElementById("result").innerText =
    "UPLOAD:\n" + JSON.stringify(data, null, 2);
}

async function extract() {
  const res = await fetch("/api/dna/extract", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ fileUrl: lastFileUrl })
  });

  const data = await res.json();
  currentDNA = data.dna;

  document.getElementById("result").innerText =
    "DNA:\n" + JSON.stringify(data, null, 2);
}

async function generate() {
  const res = await fetch("/api/variation/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      dna: currentDNA,
      similarity: 60,
      type: "club"
    })
  });

  const data = await res.json();

  document.getElementById("result").innerText =
    "VARIATION:\n" + JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
