<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SongDNA Studio</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

  <h1>SongDNA Studio 🎧</h1>

  <!-- Upload -->
  <input type="file" id="fileInput" />
  <br><br>

  <!-- Buttons -->
  <button onclick="upload()">Upload</button>
  <button onclick="extract()">Extract DNA</button>
  <button onclick="generate()">Generate Variation</button>

  <br><br>

  <!-- Result -->
  <pre id="result"></pre>

  <script>
    let currentDNA = null;

    // 🔼 Upload file
    async function upload() {
      try {
        const fileInput = document.getElementById("fileInput");

        if (!fileInput.files.length) {
          alert("בחר קובץ קודם");
          return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        const res = await fetch("/api/upload", {
          method: "POST",
          body: formData,
        });

        const data = await res.json();

        console.log("UPLOAD:", data);
        document.getElementById("result").textContent =
          JSON.stringify(data, null, 2);

      } catch (err) {
        console.error(err);
        document.getElementById("result").textContent = "Upload Error ❌";
      }
    }

    // 🧬 Extract DNA
    async function extract() {
      try {
        document.getElementById("result").textContent = "Extracting... ⏳";

        const res = await fetch("/api/dna");
        const data = await res.json();

        currentDNA = data.dna;

        console.log("DNA:", data);

        document.getElementById("result").textContent =
          JSON.stringify(data, null, 2);

      } catch (err) {
        console.error(err);
        document.getElementById("result").textContent = "DNA Error ❌";
      }
    }

    // 🔥 Generate Variation
    async function generate() {
      try {
        if (!currentDNA) {
          alert("תעשה קודם Extract DNA");
          return;
        }

        document.getElementById("result").textContent = "Generating... ⏳";

        const res = await fetch("/api/variation", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            dna: currentDNA,
            mode: "club"
          }),
        });

        const data = await res.json();

        console.log("VARIATION:", data);

        document.getElementById("result").textContent =
          JSON.stringify(data, null, 2);

      } catch (err) {
        console.error(err);
        document.getElementById("result").textContent = "Variation Error ❌";
      }
    }
  </script>

</body>
</html>
